apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cvms.fullname" . }}-test-connection"
  labels:
    {{- include "cvms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "cvms.fullname" . }}:{{ .Values.indexer.service.port }}']
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "cvms.fullname" . }}:{{ .Values.exporter.service.port }}']
  restartPolicy: Never
